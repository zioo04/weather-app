<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Weather App</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 70%; }
        button { padding: 10px; border: none; background: #007bff; color: white; border-radius: 5px; cursor: pointer; }
        .weather-info { margin-top: 20px; }
        .temp { font-size: 3rem; font-weight: bold; margin: 10px 0; }
        .desc { color: #666; text-transform: capitalize; }
    </style>
</head>
<body>

<div class="card">
    <h2>날씨 검색</h2>
    <input type="text" id="cityInput" placeholder="도시명 (예: Seoul)">
    <button onclick="getWeather()">검색</button>

    <div class="weather-info" id="info">
        </div>
</div>

<script>
    async function getWeather() {
        const city = document.getElementById('cityInput').value;
        const apiKey = 'e20cabbd5f76b38a2c843e58228c63bf'; // 여기에 발급받은 API 키를 넣으세요
        const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric&lang=kr`;

        try {
            const response = await fetch(url);
            const data = await response.json();

            if (data.cod === "404") {
                alert("도시를 찾을 수 없습니다.");
                return;
            }

            document.getElementById('info').innerHTML = `
                <h3>${data.name}</h3>
                <div class="temp">${Math.round(data.main.temp)}°C</div>
                <div class="desc">${data.weather[0].description}</div>
                <p>습도: ${data.main.humidity}%</p>
            `;
        } catch (error) {
            console.error("데이터를 가져오는 중 오류 발생:", error);
        }
    }
</script>

</body>
</html>
