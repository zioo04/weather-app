<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Retro Weather Clock</title>
    <style>
        :root {
            --case-bg: #e2dfd2; 
            --label-bg: #fdfdfd; 
            --led-off: #4a1313;
            --led-on: #ff0000;
        }
        body { 
            background: #222; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            transform: scale(1.5); 
        }
        
        .case {
            background: var(--case-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 8px 8px 25px rgba(0,0,0,0.6), inset 2px 2px 5px rgba(255,255,255,0.8);
            width: 330px;
            border: 2px solid #c9c5b5;
        }

        .weather-container {
            background: #1a1a1a; 
            padding: 15px;
            border-radius: 6px;
            border: 3px solid #b5b1a1;
        }

        .row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            opacity: 0.5;
            transition: 0.3s;
        }

        .row.active { opacity: 1; }

        /* 이모티콘이 들어갈 색상 박스 */
        .color-box {
            width: 42px; height: 34px;
            border-radius: 3px;
            margin-right: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.3);
        }
        .red { background: #d63031; }
        .yellow { background: #f1c40f; }
        .green { background: #2ecc71; }
        .blue { background: #0984e3; }

        .led {
            width: 12px; height: 12px;
            background: var(--led-off);
            border-radius: 50%;
            margin-right: 12px;
            border: 1px solid #000;
        }
        .active .led {
            background: var(--led-on);
            box-shadow: 0 0 10px var(--led-on), 0 0 5px var(--led-on);
        }

        .text-label {
            background: var(--label-bg);
            flex-grow: 1;
            padding: 6px 10px;
            border-radius: 2px;
            color: #1a1a1a;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            border: 1px solid #ccc;
        }
        .eng-sub { font-size: 10px; color: #777; font-weight: 400; }

        .footer {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        input { width: 110px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
        button { cursor: pointer; padding: 6px 12px; border-radius: 4px; background: #444; color: white; border: none; font-size: 12px; font-weight: bold; }
        .temp-display { font-size: 32px; font-weight: 900; color: #222; font-family: monospace; }
    </style>
</head>
<body>

<div class="case">
    <div class="weather-container">
        <div class="row" id="row-clear">
            <div class="color-box red">☀️</div>
            <div class="led"></div>
            <div class="text-label">よいでしょう <span class="eng-sub">Fair</span></div>
        </div>
        <div class="row" id="row-clouds">
            <div class="color-box yellow">🌤️</div>
            <div class="led"></div>
            <div class="text-label">快方に向います <span class="eng-sub">Clearing</span></div>
        </div>
        <div class="row" id="row-mist">
            <div class="color-box green">☁️</div>
            <div class="led"></div>
            <div class="text-label">下리坂に向います <span class="eng-sub">Cloudy</span></div>
        </div>
        <div class="row" id="row-rain">
            <div class="color-box blue">🌧️</div>
            <div class="led"></div>
            <div class="text-label">わるいでしょう <span class="eng-sub">Rainy</span></div>
        </div>
    </div>

    <div class="footer">
        <div>
            <input type="text" id="cityInput" placeholder="CITY NAME">
            <button onclick="getWeather()">SET</button>
        </div>
        <div class="temp-display" id="temp">--°C</div>
    </div>
</div>

<script>
    async function getWeather() {
        const city = document.getElementById('cityInput').value;
        const apiKey = 'e20cabbd5f76b38a2c843e58228c63bf'; 
        const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
            document.getElementById('temp').innerText = Math.round(data.main.temp) + "°C";

            const main = data.weather[0].main.toLowerCase();
            const desc = data.weather[0].description.toLowerCase();

            if (main.includes('clear')) {
                document.getElementById('row-clear').classList.add('active');
            } else if (main.includes('cloud') && (desc.includes('few') || desc.includes('scattered'))) {
                document.getElementById('row-clouds').classList.add('active');
            } else if (main.includes('rain') || main.includes('drizzle') || main.includes('thunderstorm')) {
                document.getElementById('row-rain').classList.add('active');
            } else {
                document.getElementById('row-mist').classList.add('active');
            }
        } catch (e) { alert("City not found!"); }
    }
</script>

</body>
</html>
